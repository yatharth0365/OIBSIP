<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper Voice Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f10;
      --surface: #1a1a1d;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8e6;
      --muted: #6b6b6a;
      --accent-green: #1D9E75;
      --accent-blue: #378ADD;
      --accent-amber: #EF9F27;
      --font: 'DM Mono', 'Fira Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    header .whisper-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
      border-radius: 20px;
      padding: 2px 10px;
    }

    .orb-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      transition: border-color 0.3s;
    }

    .ring-2 {
      inset: 12px;
      border-color: rgba(255,255,255,0.04);
    }

    .orb {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.25s;
      z-index: 2;
    }

    .orb:hover { transform: scale(1.06); border-color: rgba(255,255,255,0.22); }
    .orb:active { transform: scale(0.96); }

    .orb.recording {
      border-color: #e24b4a;
      animation: pulse-red 1.1s ease-in-out infinite;
    }

    .orb.processing { border-color: var(--accent-amber); }
    .orb.speaking   { border-color: var(--accent-blue); }

    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 0 0 rgba(226,75,74,0.3); }
      50%      { box-shadow: 0 0 0 14px rgba(226,75,74,0); }
    }

    .bars {
      position: absolute;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 36px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 3;
    }

    .bars.active { opacity: 1; }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: #e24b4a;
      animation: bar-wave 0.7s ease-in-out infinite;
    }

    .bar:nth-child(1) { height: 12px; animation-delay: 0s; }
    .bar:nth-child(2) { height: 22px; animation-delay: 0.12s; }
    .bar:nth-child(3) { height: 30px; animation-delay: 0.24s; }
    .bar:nth-child(4) { height: 22px; animation-delay: 0.36s; }
    .bar:nth-child(5) { height: 12px; animation-delay: 0.48s; }

    @keyframes bar-wave {
      0%,100% { transform: scaleY(0.45); }
      50%      { transform: scaleY(1); }
    }

    svg.mic { transition: opacity 0.2s; }

    .status-line {
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      min-height: 18px;
      margin-bottom: 2rem;
    }

    .panels {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
    }

    .panel-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .panel-content {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.65;
      min-height: 22px;
    }

    .panel-content.muted { color: var(--muted); }

    .search-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--accent-blue);
      text-decoration: underline;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    .hints {
      margin-top: 1.5rem;
      max-width: 520px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hint-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .hint-chip span {
      color: var(--text);
      opacity: 0.75;
    }

    .error-banner {
      margin-top: 1rem;
      max-width: 520px;
      width: 100%;
      background: rgba(226,75,74,0.08);
      border: 1px solid rgba(226,75,74,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.75rem;
      color: #f09595;
      line-height: 1.5;
      display: none;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

<header>
  <h1>Voice Assistant</h1>
  <span class="whisper-badge">&#9632; Browser Speech Engine</span>
</header>

<div class="orb-wrap">
  <div class="ring"></div>
  <div class="ring ring-2"></div>
  <div class="bars" id="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <div class="orb" id="orb" onclick="handleClick()" title="Click to speak">
    <svg class="mic" id="mic-svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
         stroke="#e8e8e6" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="9" y1="22" x2="15" y2="22"/>
    </svg>
  </div>
</div>

<div class="status-line" id="status">Click mic · Speak</div>

<div class="panels">
  <div class="panel">
    <div class="panel-label"><span class="dot" style="background:#6b6b6a;"></span>Speech transcript</div>
    <div class="panel-content muted" id="transcript">—</div>
  </div>
  <div class="panel">
    <div class="panel-label"><span class="dot" style="background:#378ADD;"></span>Assistant reply</div>
    <div class="panel-content" id="reply">Hello! Click the mic and speak a command.</div>
    <div id="search-link-wrap"></div>
  </div>
</div>

<div class="hints">
  <div class="hint-chip">"<span>Hello</span>" — greeting</div>
  <div class="hint-chip">"<span>What time is it?</span>"</div>
  <div class="hint-chip">"<span>What's today's date?</span>"</div>
  <div class="hint-chip">"<span>Search for black holes</span>"</div>
</div>

<div class="error-banner" id="error-banner"></div>

<script>
  const BACKEND = "http://localhost:5000/command";

  let recognition = null;
  let isListening = false;
  let isBusy = false;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  const orb = document.getElementById('orb');
  const bars = document.getElementById('bars');
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');
  const replyEl = document.getElementById('reply');
  const searchWrap = document.getElementById('search-link-wrap');
  const errorBanner = document.getElementById('error-banner');

  function setStatus(msg) { statusEl.textContent = msg; }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 6000);
  }

  function speak(text) {
    window.speechSynthesis.cancel();
    if (!text) {
      orb.className = 'orb';
      setStatus('Click mic · Speak');
      isBusy = false;
      return;
    }
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0;
    orb.className = 'orb speaking';
    setStatus('Speaking…');
    u.onend = () => { orb.className = 'orb'; setStatus('Click mic · Speak'); isBusy = false; };
    u.onerror = () => { orb.className = 'orb'; setStatus('Click mic · Speak'); isBusy = false; };
    window.speechSynthesis.speak(u);
  }

  async function sendCommand(text) {
    orb.className = 'orb processing';
    setStatus('Processing command…');
    isBusy = true;
    searchWrap.innerHTML = '';

    try {
      const res = await fetch(BACKEND, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();

      if (data.error) {
        showError('Assistant error: ' + data.error);
        orb.className = 'orb';
        setStatus('Click mic · Speak');
        isBusy = false;
        return;
      }

      transcriptEl.textContent = data.transcript || text || '—';
      transcriptEl.classList.remove('muted');
      replyEl.textContent = data.reply || '';

      if (data.search_url) {
        window.open(data.search_url, '_blank');
        const a = document.createElement('span');
        a.className = 'search-link';
        a.textContent = '⟶ Opened search results for "' + (data.query || '') + '"';
        a.onclick = () => window.open(data.search_url, '_blank');
        searchWrap.appendChild(a);
      }

      speak(data.reply || '');
    } catch (e) {
      showError('Could not reach backend at localhost:5000. Is app.py running?');
      orb.className = 'orb';
      setStatus('Click mic · Speak');
      isBusy = false;
    }
  }

  function startListening() {
    if (isBusy || isListening) return;
    if (!SpeechRecognition) {
      showError('SpeechRecognition is not supported in this browser.');
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.continuous = false;

    recognition.onstart = () => {
      isListening = true;
      orb.className = 'orb recording';
      bars.className = 'bars active';
      setStatus('Listening… speak now');
    };

    recognition.onresult = async (event) => {
      const transcript = (event.results?.[0]?.[0]?.transcript || '').trim();
      transcriptEl.textContent = transcript || '—';
      transcriptEl.classList.remove('muted');

      if (!transcript) {
        showError('No speech detected. Try again.');
        return;
      }

      await sendCommand(transcript);
    };

    recognition.onerror = (event) => {
      if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
        showError('Microphone access denied. Please allow mic access and reload.');
      } else if (event.error !== 'aborted') {
        showError('Speech recognition error: ' + event.error);
      }
    };

    recognition.onend = () => {
      isListening = false;
      bars.className = 'bars';
      if (!isBusy) {
        orb.className = 'orb';
        setStatus('Click mic · Speak');
      }
    };

    recognition.start();
  }

  function stopListening() {
    if (!isListening || !recognition) return;
    recognition.stop();
    isListening = false;
    bars.className = 'bars';
    orb.className = 'orb';
    setStatus('Processing…');
  }

  function handleClick() {
    if (isBusy) return;
    if (isListening) {
      stopListening();
    } else {
      startListening();
    }
  }

  if (!SpeechRecognition) {
    showError('Your browser does not support SpeechRecognition.');
    setStatus('SpeechRecognition not supported');
  } else {
    setStatus('Click mic · Speak');
  }
</script>
</body>
</html>
